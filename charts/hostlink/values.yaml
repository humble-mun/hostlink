# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------
image: harbor-c0a811fc.nip.io/humble-mun/hostlink:v0.1.0

# replicaCount is the number of controller pods, running as a StatefulSet so each
# pod gets a stable ordinal name + per-pod DNS via the headless Service. Default 1
# works out of the box (in-memory registry, no redis needed). For HA set it >1:
# each agent pins its connection to the one pod it dialed while API requests land
# on any replica, so >1 replicas exercise the cross-pod routing path and therefore
# REQUIRE both redis.url and peer.tlsSecretName (enforced at install/upgrade).
replicaCount: 1

# ---------------------------------------------------------------------------
# mTLS gRPC listener (agent connections)
# ---------------------------------------------------------------------------
# This is the ingress-facing listener that NAT'd agents dial out to. It
# terminates mutual TLS (TLS 1.3 minimum, no insecure fallback): the controller
# presents grpc.tlsCertPath/tlsKeyPath and requires-and-verifies each agent's
# client certificate against grpc.tlsCAPath. This is the agent identity
# mechanism at the connection layer.
grpc:
  # bindAddress is the host:port the mTLS gRPC listener binds, as host:port.
  # Maps to --grpc-bind-address.
  bindAddress: "0.0.0.0:8443"

  # tlsCertPath / tlsKeyPath are the in-container paths to the server
  # certificate and key the controller presents to agents.
  # Maps to --grpc-tls-cert-path / --grpc-tls-key-path.
  tlsCertPath: /etc/humble-mun/controller/tls.crt
  tlsKeyPath:  /etc/humble-mun/controller/tls.key

  # tlsCAPath is the in-container path to the CA bundle used to verify agent
  # client certificates. Maps to --grpc-tls-ca-path.
  tlsCAPath: /etc/humble-mun/controller/ca.crt

  # tlsSecretName is the Secret (type kubernetes.io/tls or opaque) holding the
  # server cert/key and CA bundle mounted at /etc/humble-mun/controller. Used only
  # when certManager.enabled is false (otherwise cert-manager issues the cert via
  # the CSI driver). There is no insecure fallback, so the pod will not serve
  # agents without one of the two sources.
  tlsSecretName: hostlink-controller-grpc-tls

  # dnsNames are the SANs cert-manager puts on the agent-facing server certificate
  # (used only when certManager.enabled). Must include whatever agents verify
  # against -- i.e. their --controller-tls-server-name, typically the ingress host.
  dnsNames: []

# ---------------------------------------------------------------------------
# ControllerPeer listener (controller <-> controller, in-cluster only)
# ---------------------------------------------------------------------------
# The pod-to-pod plane: a replica that receives an API request for an agent it
# does not hold relays it (ControllerPeer.Dispatch) to the holding pod, dialed
# via the headless Service per-pod DNS. Reachable only in-cluster and never
# exposed through the ingress. Like the agent listener it is intended to be
# mTLS (controller certs) consistent with the mTLS-everywhere model. This is
# forward-prep: the chart wires the port + headless DNS, but nothing binds the
# listener until the ControllerPeer service is implemented.
peer:
  # enabled turns on the ControllerPeer cross-pod relay plane: the listener is
  # bound and a request for an agent held by a sibling is relayed to it. Off
  # DISABLES the plane (such a request returns 404). Required together with
  # redis.url whenever replicaCount > 1.
  enabled: false

  # bindAddress is the host:port the ControllerPeer mTLS listener binds.
  bindAddress: "0.0.0.0:8444"

  # tlsSecretName is the Secret holding the controller cert/key + peer CA bundle
  # for the ControllerPeer plane (the controller is both server and client here).
  # Used only when certManager.enabled is false; otherwise cert-manager issues a
  # per-pod cert via the CSI driver.
  tlsSecretName: ""

  # tlsCertPath / tlsKeyPath / tlsCAPath are the in-container paths the peer cert
  # material is mounted at. Maps to --peer-tls-cert-path / --peer-tls-key-path /
  # --peer-tls-ca-path.
  tlsCertPath: /etc/humble-mun/controller-peer/tls.crt
  tlsKeyPath:  /etc/humble-mun/controller-peer/tls.key
  tlsCAPath:   /etc/humble-mun/controller-peer/ca.crt

# ---------------------------------------------------------------------------
# Redis (cross-pod agent registry)
# ---------------------------------------------------------------------------
# Backs the agent->pod mapping the ControllerPeer plane resolves against. Empty
# keeps the registry in-memory (single replica / dev): a request for an agent
# held by another replica returns 404. Cross-pod relay needs BOTH redis.url and
# peer.enabled set.
redis:
  # url is the connection URL. Maps to --redis-url. The deployment topology is
  # selected by the URL scheme, so no extra setting is needed:
  #   standalone: redis://:password@hostlink-redis:6379/0   (also rediss:// for TLS)
  #   sentinel:   redis+sentinel://sentinel:26379?master_name=mymaster&addr=sentinel2:26379
  #   cluster:    redis+cluster://node1:6379?addr=node2:6379&addr=node3:6379
  # Extra sentinel/cluster nodes are listed via the repeatable ?addr= query
  # parameter. Username/password and ?db go in the URL as usual.
  url: ""

# ---------------------------------------------------------------------------
# cert-manager (optional certificate issuance)
# ---------------------------------------------------------------------------
# When enabled, the controller's mTLS material -- the agent-facing gRPC server
# cert and the ControllerPeer cert -- is issued by cert-manager through the
# cert-manager CSI driver (csi.cert-manager.io) instead of being mounted from
# pre-created Secrets. The CSI driver mints a short-lived per-pod certificate at
# pod start and renews it in place, which fits the peer plane whose SAN must carry
# the pod's own headless DNS name (no wildcard needed). Requires both cert-manager
# and cert-manager-csi-driver installed in the cluster.
#
# NOTE: the controller verifies agent client certs (grpc) and sibling certs (peer)
# against the ca.crt the CSI driver writes -- the issuer's CA. So agents and all
# controllers must be issued from the same trust chain as this issuer.
certManager:
  enabled: false

  # issuerKind is Issuer or ClusterIssuer.
  issuerKind: ClusterIssuer

  # issuerName is the (Cluster)Issuer that signs the controller certificates.
  # Required when enabled.
  issuerName: ""

  # issuerGroup is the issuer's API group (cert-manager.io for the built-in
  # issuers; change only for an external issuer).
  issuerGroup: cert-manager.io

  # duration / renewBefore control the issued certificate lifetime and rotation.
  duration: 2160h    # 90d
  renewBefore: 360h  # 15d

# ---------------------------------------------------------------------------
# Default listener (in-cluster: metrics / probe / version / logging)
# ---------------------------------------------------------------------------
# The chassis HTTP/2 server multiplexes gRPC and Gin onto every listener. This
# default listener is left PLAINTEXT (h2c) on purpose and must stay reachable
# only inside the cluster: it serves /metrics (controller self-metrics) and
# /api/v1/metrics (the aggregated agent-exporter fan-out) for Prometheus, plus
# /probe, /version and /logging. The chart ships no scrape config -- point your
# Prometheus/VictoriaMetrics scrape (annotation, ServiceMonitor, or VMServiceScrape)
# at this http port and both paths; see the README "Scraping the metrics" note.
# Because the shared chassis handler would also accept gRPC here, the agent/data
# split relies on network-layer isolation -- this listener is never exposed
# through the ingress.
http:
  # bindAddress maps to --http-bind-address. Kept plaintext (no TLS cert/key)
  # so K8s probes and Prometheus can reach it over h2c in-cluster.
  bindAddress: "0.0.0.0:8080"

# ---------------------------------------------------------------------------
# Ingress (agent-facing gRPC only)
# ---------------------------------------------------------------------------
# Exposes ONLY the mTLS gRPC listener so NAT'd agents can dial out to the
# controller. The controller terminates mutual TLS itself (the agent client
# certificate is the identity), so the ingress MUST pass raw TCP through and
# must NOT terminate TLS -- otherwise the client cert is stripped and the
# agent identity model collapses. The same failure occurs if the ingress (or
# the platform default) auto-attaches a wildcard server cert and terminates:
# the agent then validates the ingress cert, not the controller's, and its
# client cert never reaches the controller. TLS passthrough must therefore be
# asserted EXPLICITLY via annotations because it is ingress-controller specific
# (e.g. nginx, which also requires --enable-ssl-passthrough on the controller):
#   nginx.ingress.kubernetes.io/ssl-passthrough: "true"
# Only ingress controllers that support true L4 passthrough (nginx with
# ssl-passthrough, HAProxy, Contour TCPProxy) are safe here. For production a
# raw L4 Service type=LoadBalancer or a Gateway-API TCPRoute avoids this whole
# class of bug; leave ingress.host empty to disable this Ingress entirely.
# The in-cluster plaintext default listener (http) is never exposed here.
ingress:
  # className selects the IngressClass (the ingress controller) to use.
  className: ""

  # host is the external hostname agents dial out to for the gRPC listener.
  host: ""

  # annotations carries extra controller-specific annotations. This is where
  # TLS-passthrough behavior is enabled (see the note above) -- left empty by
  # default so the operator opts in explicitly for their ingress controller.
  annotations: {}

# ---------------------------------------------------------------------------
# Pod scheduling
# ---------------------------------------------------------------------------
# nodeSelector is intentionally omitted: node targeting is expressed through
# affinity below.
affinity: {}
tolerations: []

priorityClassName: ""

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 50m
    memory: 64Mi
