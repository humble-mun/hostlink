apiVersion: v2
name: hostlink
description: >
  The cloud-side control plane for hostlink. Runs in Kubernetes (>=2 replicas for
  HA) as the gRPC server that NAT'd hostlink-agents dial out to over a persistent
  mutually-authenticated (mTLS) connection, dispatching Docker and exposure
  commands, aggregating agent metrics, and driving reverse TCP tunnels.
type: application
version: 0.1.0
appVersion: 0.1.0
