# hostlink agent configuration — install to /etc/humble-mun/hostlink.yaml
#
# The agent reads this file at startup and watches it for changes (the chassis
# calls viper.WatchConfig), so edits are picked up at runtime without a
# `systemctl daemon-reload` and without restarting the unit. The lookup path is
# fixed: the chassis registers SetConfigName("hostlink") + AddConfigPath("/etc/humble-mun"),
# and the binary's name is "hostlink" (set via -ldflags version.Name at build), so
# the file must live at /etc/humble-mun/hostlink.yaml.
#
# Keys are the flag names verbatim. Anything set here can also be overridden by
# an HM_* environment variable (uppercase the key, replace '-' with '_', prefix
# HM_ — e.g. controller-endpoint -> HM_CONTROLLER_ENDPOINT).

# --------------------------------------------------------------------------
# Controller connection
# --------------------------------------------------------------------------

# Address of the controller gRPC endpoint to dial, as host:port.
# REQUIRED — the agent exits immediately if this is empty.
controller-endpoint: "controller.example.com:8443"

# Server name to verify against the controller's certificate. Set this when the
# certificate's SAN does not match the dial host (otherwise leave it empty and
# the controller cert is verified against the endpoint host).
controller-tls-server-name: "controller.example.com"

# --------------------------------------------------------------------------
# mTLS material (provisioned out-of-band by the operator)
# --------------------------------------------------------------------------
# The agent presents a client certificate to the controller and verifies the
# controller's server certificate against the CA bundle. There is no insecure
# fallback: if any of these are missing or invalid, the connection fails hard.

# CA bundle used to verify the controller's server certificate.
controller-tls-ca-path: "/etc/humble-mun/agent/ca.crt"
# Client certificate the agent presents to the controller for mTLS.
agent-tls-cert-path: "/etc/humble-mun/agent/tls.crt"
# Private key matching the client certificate.
agent-tls-key-path: "/etc/humble-mun/agent/tls.key"

# --------------------------------------------------------------------------
# Identity
# --------------------------------------------------------------------------

# Logical name for this host; becomes the agent_id the controller sees. Defaults
# to empty — set it to the hostname (or another stable identifier) so the agent
# is distinguishable on the controller side.
node-name: ""

# --------------------------------------------------------------------------
# Working directory (fs API)
# --------------------------------------------------------------------------

# Directory whose contents the controller can browse, download, upload, and
# delete through the fs API (GET/POST/PUT/DELETE /api/v1/agents/<id>/files). Leave
# empty to disable the fs API. The directory must already exist and be writable
# by the agent user; the systemd unit provisions /var/lib/hostlink for this via
# StateDirectory before the agent starts.
data-dir: "/var/lib/hostlink"

# --------------------------------------------------------------------------
# Metrics scrape targets (upstream exporters)
# --------------------------------------------------------------------------

# Upstream exporters the agent pulls when the controller fans out a scrape. The
# controller aggregates every agent's targets behind its own GET /api/v1/metrics
# endpoint, injecting an `agent=<node-name>` label and an `exporter=<name>` label
# into every series (see the controller-side metrics endpoint). Leave the list
# empty (or omit it) to disable the feature.
#
# Each entry is a name + an exporter url. `name` becomes the `exporter` label, so
# keep it short and stable (e.g. node, dcgm, cadvisor). The url scheme selects the
# transport:
#   - http/https — a TCP endpoint (typically a 127.0.0.1 sidecar). The path
#     defaults to /metrics when omitted (http://127.0.0.1:9100 == .../metrics).
#   - unix       — a unix domain socket; the url path IS the socket path
#     (unix:///var/run/foo/server.sock, three slashes). The HTTP request path
#     defaults to /metrics; set `path` to override it.
# The agent GETs each target locally with a short per-target timeout and streams
# the raw exposition back over the existing connection.
scrape-targets:
- name: node
  url: http://127.0.0.1:9100
- name: dcgm
  url: http://127.0.0.1:9400
# Example unix-socket exporter (uncomment and adjust):
# - name: cadvisor
#   url: unix:///var/run/cadvisor/server.sock
#   path: /metrics
